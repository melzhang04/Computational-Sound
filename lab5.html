<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Lab 5 - Cellular Automata Composition</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #1e5fa8;
      --blue-2: #3d7fd3;
      --blue-3: #eef5ff;
      --lavender: #8f7bd8;
      --pink: #c48bb5;
      --border: #c9dcf7;
      --text: #102033;
      --muted: #5d7190;
      --card: #ffffff;
      --bg: #f5f8fd;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f8fbff, #edf4ff);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(1120px, 100%);
      min-height: min(720px, calc(100vh - 48px));
      display: grid;
      grid-template-columns: 1.35fr 0.85fr;
      gap: 24px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(30, 95, 168, 0.12);
      padding: 24px;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    h1 {
      font-size: 1.55rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blue);
    }

    p {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .canvas-wrap {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
    }

    canvas {
    display: block;
    border-radius: 12px;
    }

    .transport {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button, .blog-link {
      border: 1px solid var(--blue-2);
      background: #fff;
      color: var(--blue);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 12px;
      border-radius: 999px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: 0.15s ease;
    }

    button:hover, .blog-link:hover {
      background: var(--blue-3);
      transform: translateY(-1px);
    }

    #startBtn {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    #startBtn:hover {
      background: var(--blue-2);
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--blue);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      margin-top: 6px;
    }

    .control-row {
      display: grid;
      grid-template-columns: 90px 1fr 48px;
      align-items: center;
      gap: 10px;
      min-height: 30px;
    }

    .control-row label {
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .control-row select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.78rem;
      padding: 7px 9px;
    }

    .control-row input[type="range"] {
      width: 100%;
      accent-color: var(--blue-2);
      cursor: pointer;
    }

    .control-row:has(select) {
      grid-template-columns: 90px 1fr;
    }

    .val {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--blue);
      text-align: right;
    }

    .blog-link {
      margin-top: auto;
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      width: 100%;
      display: block;
    }

    @media (max-width: 850px) {
      body {
        align-items: flex-start;
        padding: 16px;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .transport {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel left">
      <div>
        <h1>CA Composer</h1>
        <p>Click cells to toggle notes. Each column is one time step, and each row is one pitch.</p>
      </div>

      <div class="canvas-wrap">
        <canvas id="caCanvas"></canvas>
      </div>

      <div class="transport">
        <button id="startBtn">&#9654; Start</button>
        <button id="stopBtn">&#9632; Stop</button>
        <button id="randomizeBtn">Randomize</button>
        <button id="clearBtn">Clear</button>
      </div>
    </section>

    <section class="panel right">
      <div class="section-label">Sound</div>

      <div class="control-row">
        <label>Scale</label>
        <select id="scaleSelect">
          <option value="pentatonic">Pentatonic</option>
          <option value="major">Major</option>
          <option value="minor">Natural minor</option>
          <option value="dorian">Dorian</option>
          <option value="blues">Blues</option>
          <option value="whole">Whole tone</option>
          <option value="chromatic">Chromatic</option>
        </select>
      </div>

      <div class="control-row">
        <label>Root</label>
        <select id="rootSelect">
          <option value="60">C</option>
          <option value="61">C#</option>
          <option value="62">D</option>
          <option value="63">D#</option>
          <option value="64">E</option>
          <option value="65">F</option>
          <option value="66">F#</option>
          <option value="67">G</option>
          <option value="68">G#</option>
          <option value="69">A</option>
          <option value="70">A#</option>
          <option value="71">B</option>
        </select>
      </div>

      <div class="control-row">
        <label>Oscillator</label>
        <select id="oscSelect">
          <option value="sine">Sine</option>
          <option value="triangle">Triangle</option>
          <option value="square">Square</option>
          <option value="sawtooth">Sawtooth</option>
        </select>
      </div>

      <div class="control-row">
        <label>Volume</label>
        <input type="range" id="volumeSlider" min="0" max="100" value="70" step="1">
        <span class="val" id="volumeVal">70%</span>
      </div>

      <div class="control-row">
        <label>Reverb</label>
        <input type="range" id="reverbSlider" min="0" max="100" value="20" step="1">
        <span class="val" id="reverbVal">20%</span>
      </div>

      <div class="control-row">
        <label>Tempo</label>
        <input type="range" id="tempoSlider" min="80" max="800" value="250" step="10">
        <span class="val" id="tempoVal">250 ms</span>
      </div>

      <div class="section-label">CA Rules</div>

      <div class="control-row">
        <label>Birth</label>
        <input type="range" id="birthSlider" min="0" max="8" value="3" step="1">
        <span class="val" id="birthVal">3</span>
      </div>

      <div class="control-row">
        <label>Surv min</label>
        <input type="range" id="survMinSlider" min="0" max="8" value="2" step="1">
        <span class="val" id="survMinVal">2</span>
      </div>

      <div class="control-row">
        <label>Surv max</label>
        <input type="range" id="survMaxSlider" min="0" max="8" value="5" step="1">
        <span class="val" id="survMaxVal">5</span>
      </div>

      <div class="control-row">
        <label>Density</label>
        <input type="range" id="densitySlider" min="0.05" max="0.7" value="0.35" step="0.05">
        <span class="val" id="densityVal">35%</span>
      </div>

      <a class="blog-link" href="lab5-writeup.html">Blog Post</a>
    </section>
  </main>

  <script src="lab5.js"></script>
</body>
</html>
